# docker-compose.yml — Catalyst development environment
#
# Quick start:
#   cp .env.example .env                                          # fill in 2 values
#   docker compose up -d                                          # start everything
#   docker compose exec backend python manage.py seed_demo        # load demo data
#   open http://localhost:5174
#
# Daily commands:
#   docker compose exec backend python manage.py test investigations --keepdb
#   docker compose logs -f backend
#   docker compose down                                           # stop (data persists)

services:

  # ---------------------------------------------------------------------------
  # db — PostgreSQL 16
  # ---------------------------------------------------------------------------
  db:
    image: postgres:16-alpine
    container_name: catalyst_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: catalyst_db
      POSTGRES_USER: catalyst_user
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - catalyst_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U catalyst_user -d catalyst_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # backend — Django API (runserver with hot reload via volume mount)
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: docker/Dockerfile
    container_name: catalyst_backend
    restart: unless-stopped
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-True}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1}
      POSTGRES_DB: catalyst_db
      POSTGRES_USER: catalyst_user
      DB_PASSWORD: ${DB_PASSWORD}
      DB_HOST: db
      DB_PORT: "5432"
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      CATALYST_REQUIRE_AUTH: ${CATALYST_REQUIRE_AUTH:-False}
      CATALYST_API_TOKENS: ${CATALYST_API_TOKENS:-}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-http://localhost:5174,http://127.0.0.1:5174}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"

  # ---------------------------------------------------------------------------
  # qcluster — Django-Q2 async worker (processes research + IRS fetch jobs)
  # ---------------------------------------------------------------------------
  qcluster:
    build:
      context: ./backend
      dockerfile: docker/Dockerfile
    container_name: catalyst_qcluster
    restart: unless-stopped
    command: python manage.py qcluster
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-True}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1}
      POSTGRES_DB: catalyst_db
      POSTGRES_USER: catalyst_user
      DB_PASSWORD: ${DB_PASSWORD}
      DB_HOST: db
      DB_PORT: "5432"
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      CATALYST_REQUIRE_AUTH: ${CATALYST_REQUIRE_AUTH:-False}
      CATALYST_API_TOKENS: ${CATALYST_API_TOKENS:-}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app

  # ---------------------------------------------------------------------------
  # frontend — Vite dev server with HMR
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: catalyst_frontend
    restart: unless-stopped
    environment:
      # Vite's proxy (running inside the container) routes /api/ here.
      # The browser never talks to this URL directly.
      VITE_API_URL: http://backend:8000
    ports:
      - "5174:5174"
    volumes:
      - ./frontend:/app
      # Anonymous volume preserves the container's node_modules so the
      # host bind-mount cannot shadow the packages installed during build.
      - /app/node_modules
    depends_on:
      - backend

volumes:
  catalyst_pgdata:
