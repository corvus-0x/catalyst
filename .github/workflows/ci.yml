name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  backend-lint:
    name: Backend Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      # Auto-fix import sorting and other fixable issues, then verify nothing
      # unfixable remains. Format is applied (not just checked) so style
      # differences from different OS line-endings never block the build.
      - name: Ruff lint (auto-fix)
        run: ruff check --fix --config ../pyproject.toml .

      - name: Ruff format (auto-fix)
        run: ruff format --config ../pyproject.toml .

  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: catalyst_db
          POSTGRES_USER: catalyst_user
          POSTGRES_PASSWORD: ci_test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U catalyst_user -d catalyst_db"
          --health-interval 10s --health-timeout 5s --health-retries 5
    defaults:
      run:
        working-directory: backend
    env:
      DATABASE_URL: postgres://catalyst_user:ci_test_password@localhost:5432/catalyst_db
      DJANGO_SECRET_KEY: ci-not-secret
      ANTHROPIC_API_KEY: ci-dummy-key
      # Auth off in CI to mirror local dev (docker-compose.yml defaults this to
      # False). Without it, settings.py defaults REQUIRE_AUTH to True and every
      # API test gets 401. The auth middleware itself is unit-tested in
      # investigations/tests/test_steps_1_through_4.py.
      CATALYST_REQUIRE_AUTH: "False"
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: pip install -r requirements.txt
      - name: Migrate
        run: python manage.py migrate
      # Fail if a model changed without a matching migration. --check exits
      # non-zero when makemigrations *would* create something; --dry-run keeps
      # it from actually writing files. Catches the classic "forgot to make the
      # migration" mistake before it breaks the Railway deploy.
      - name: Check for missing migrations
        run: python manage.py makemigrations --check --dry-run
      - name: Run backend tests
        # Exclude the @tag("eval") suite (investigations/tests/evals): it makes
        # live Claude API calls and is meant to be run on demand with a real
        # ANTHROPIC_API_KEY, never in CI.
        run: python manage.py test investigations --exclude-tag=eval

  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    # Least privilege: this job only needs to read the repo to scan it.
    permissions:
      contents: read
    steps:
      # fetch-depth: 0 pulls the FULL history so gitleaks scans every commit,
      # not just the tip — a key leaked three commits ago still gets caught.
      # Pinned to a full commit SHA: mutable tags (@v5) can be re-pointed at
      # malicious code, so pin + comment the human-readable version.
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
          persist-credentials: false
      # Pinned binary instead of the gitleaks-action so there's no org-license
      # surprise and the exact version is reproducible. The tarball is verified
      # against the release's published SHA-256 checksums before extraction, so a
      # tampered download fails the job. `detect` scans git history; --redact
      # keeps any hit out of the public CI log.
      - name: Install gitleaks (checksum-verified)
        run: |
          VERSION=8.21.2
          BASE="https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}"
          TARBALL="gitleaks_${VERSION}_linux_x64.tar.gz"
          # Keep the published filename so `sha256sum -c` can find the file named
          # in the checksums line.
          curl -sSfL "${BASE}/${TARBALL}" -o "${TARBALL}"
          curl -sSfL "${BASE}/gitleaks_${VERSION}_checksums.txt" -o checksums.txt
          grep " ${TARBALL}\$" checksums.txt | sha256sum -c -
          tar -xzf "${TARBALL}" gitleaks
          sudo mv gitleaks /usr/local/bin/
      - name: Scan for secrets
        run: gitleaks detect --no-banner --redact --source .

  frontend-check:
    name: Frontend Lint, Test & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm install

      # Banned-strings gate: fails the build if any user-visible source string
      # exposes a model/vendor name (CLAUDE.md "Banned strings"). Cheapest check,
      # so it runs first and fails fast. See frontend/scripts/check-banned-strings.mjs.
      - name: Banned UI strings
        run: npm run check:strings

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test

      - name: Build
        run: npx vite build
